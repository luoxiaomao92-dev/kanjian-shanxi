<svg xmlns="http://www.w3.org/2000/svg" width="2600" height="760" viewBox="0 0 2600 760" role="img" aria-labelledby="title desc">
  <title id="title">晋商发展脉络横向时间轴</title>
  <desc id="desc">从明初、开中法、贩盐、折色法、茶马互市、皇商、万里茶道、票号、汇通天下到清末衰落的晋商发展曲线长卷，并标注开中法、折色法、走西口和银行票号的大致时间。</desc>
  <defs>
    <style>
      @font-face {
        font-family: "CuanBaoZiBei";
        src: url("../fonts/CuanBaoZiBei.ttf") format("truetype");
      }
      .paper { fill: #F8F8F6; }
      .grid { stroke: #222222; stroke-width: 1; fill: none; opacity: .055; }
      .ink { stroke: #222222; stroke-width: 2.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #222222; stroke-width: 1.4; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: .7; }
      .ocher-stroke { stroke: #9A6946; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .ocher-fill { fill: #9A6946; }
      .node-fill { fill: #F8F8F6; stroke: #222222; stroke-width: 2; }
      .panel-line { stroke: #222222; stroke-width: 1.2; fill: none; opacity: .16; }
      .title-text { fill: #222222; font-family: "CuanBaoZiBei", "STKaiti", "KaiTi", serif; font-size: 52px; font-weight: 600; letter-spacing: 0; }
      .small-caps { fill: #9A6946; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0; }
      .node-title { fill: #222222; font-family: "CuanBaoZiBei", "STKaiti", "KaiTi", serif; font-size: 35px; font-weight: 600; letter-spacing: 0; }
      .body { fill: #3F3D37; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 20px; font-weight: 500; letter-spacing: 0; }
      .note { fill: #9A6946; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 18px; font-weight: 800; letter-spacing: 0; }
      .year { fill: #68655D; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 16px; font-weight: 800; letter-spacing: 0; }
      .date { fill: #9A6946; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0; }
      .caption { fill: #68655D; font-family: system-ui, -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; font-size: 17px; font-weight: 500; letter-spacing: 0; }
    </style>
    <pattern id="surveyGrid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path class="grid" d="M52 0H0V52" />
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#222222" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect class="paper" width="2600" height="760" />
  <rect width="2600" height="760" fill="url(#surveyGrid)" />
  <text class="small-caps" x="96" y="132">JINSHANG DEVELOPMENT</text>
  <text class="title-text" x="96" y="194">晋商发展脉络</text>

  <path class="thin" d="M168 426C430 420 580 400 664 382C820 348 1020 322 1160 330C1290 334 1420 306 1656 296C1770 288 1860 286 1904 292C2030 302 2150 330 2250 360C2325 390 2370 410 2425 426" marker-end="url(#arrow)" />
  <path class="ocher-stroke" d="M168 426C560 408 800 346 1160 330C1430 318 1610 288 1904 292C2130 302 2312 382 2425 426" opacity=".24" />

  <g transform="translate(138 360)">
    <circle class="node-fill" cx="30" cy="66" r="13" />
    <path class="ink" d="M8 42H58M12 42V18H54V42M18 42V28H28V42M38 42V28H48V42M8 50H58M18 18V10M44 18V10" />
    <text class="date" x="-34" y="-16">明初 1368后</text>
    <text class="node-title" x="-38" y="126">明初</text>
    <text class="body" x="-56" y="165">边防与财政重建，</text>
    <text class="body" x="-56" y="194">商路重新被组织。</text>
  </g>

  <g transform="translate(386 354)">
    <circle class="node-fill" cx="30" cy="66" r="13" />
    <path class="ink" d="M7 50H59M11 50V25L33 14L55 25V50M18 50V31H48V50M21 38H45M21 44H45" />
    <path class="thin" d="M33 14V50" />
